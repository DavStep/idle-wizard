apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def packageJson = new JsonSlurper().parse(file('../../package.json'))
def appVersionName = packageJson.version.toString()
def appVersionParts = appVersionName.tokenize('.').collect { part -> part.replaceAll(/\D.*$/, '').toInteger() }
def appVersionCode = (appVersionParts[0] * 10000) + (appVersionParts[1] * 100) + appVersionParts[2]
def releaseStoreFile = findProperty('IDLE_WIZARD_RELEASE_STORE_FILE') ?: System.getenv('IDLE_WIZARD_RELEASE_STORE_FILE')
def releaseStorePassword = findProperty('IDLE_WIZARD_RELEASE_STORE_PASSWORD') ?: System.getenv('IDLE_WIZARD_RELEASE_STORE_PASSWORD')
def releaseKeyAlias = findProperty('IDLE_WIZARD_RELEASE_KEY_ALIAS') ?: System.getenv('IDLE_WIZARD_RELEASE_KEY_ALIAS')
def releaseKeyPassword = findProperty('IDLE_WIZARD_RELEASE_KEY_PASSWORD') ?: System.getenv('IDLE_WIZARD_RELEASE_KEY_PASSWORD')
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword]
    .every { value -> value != null && value.toString().trim() }

android {
    namespace = "com.idlewizard.game"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.idlewizard.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile.toString())
                storePassword releaseStorePassword.toString()
                keyAlias releaseKeyAlias.toString()
                keyPassword releaseKeyPassword.toString()
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    applicationVariants.all { variant ->
        if (variant.buildType.name == 'release') {
            variant.outputs.all {
                def unsignedSuffix = variant.signingConfig == null ? '-unsigned' : ''
                outputFileName = "idle-wizard-${appVersionName}-release${unsignedSuffix}.apk"
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.credentials:credentials:$androidxCredentialsVersion"
    implementation "androidx.credentials:credentials-play-services-auth:$androidxCredentialsVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.libraries.identity.googleid:googleid:$googleIdVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
