<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idle Wizard tutorial flow screenshots</title>
    <style>
      :root {
        color: #1a1a1a;
        background: #dedede;
        font-family:
          Lexend, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #dedede;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
        line-height: 1.2;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        align-items: start;
      }

      figure {
        margin: 0;
        padding: 6px;
        background: #dedede;
        border: 1px solid #1a1a1a;
      }

      img {
        display: block;
        width: 100%;
        border: 1px solid #5e5e5e;
      }

      figcaption {
        margin-top: 5px;
        font-size: 10px;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <h1>Idle Wizard tutorial flow screenshots</h1>
    <section class="grid" id="grid"></section>
    <script type="module">
      const grid = document.querySelector('#grid');
      const response = await fetch('./screenshots/capture-index.json');
      const captures = await response.json();

      for (const capture of captures) {
        const figure = document.createElement('figure');
        const image = document.createElement('img');
        const caption = document.createElement('figcaption');

        image.src = `./screenshots/${capture.fileName}`;
        image.alt = `${capture.index}. ${capture.id}`;
        caption.textContent = `${capture.index}. ${capture.id}`;
        figure.append(image, caption);
        grid.append(figure);
      }
    </script>
  </body>
</html>
